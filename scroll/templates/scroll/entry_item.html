<section id="entry-{{ entry.id }}" class="group relative pl-8 mb-10 transition-all duration-300">

  <div class="absolute left-0 top-2 bottom-0 w-[2px] bg-zinc-100 group-hover:bg-zinc-200 transition-colors"></div>

  <div
    class="flex items-center gap-1.5 text-[10px] font-bold text-zinc-300 uppercase tracking-widest mb-2 group-hover:text-zinc-500 transition-colors">
    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" />
      <polyline points="12 6 12 12 16 14" />
    </svg>
    {{ entry.created_at|timesince }} ago
  </div>

  <div class="relative text-zinc-700 leading-relaxed">
    <p class="text-[15px] selection:bg-zinc-900 selection:text-white">{{ entry.body }}</p>

    <div class="mt-8 flex items-center gap-4 group-hover:opacity-100 transition-opacity duration-200">
      {% if entry.label %}
      <span
        class="text-xs font-black uppercase text-black bg-zinc-100 px-1.5 py-1 rounded cursor-default">
        {{ entry.label.name }}
      </span>
      {% endif %}

      <div class="flex items-center gap-3 border-zinc-200">
        <button hx-get="{% url 'edit_entry' entry.id %}" hx-target="#entry-{{ entry.id }}" hx-swap="outerHTML"
          title="Edit entry" class="text-zinc-400 hover:text-zinc-900 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="#1d1d1d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
            <path d="m15 5 4 4" />
          </svg>
        </button>

        <button hx-delete="{% url 'delete_entry' entry.id %}" hx-target="#entry-{{ entry.id }}" hx-swap="outerHTML"
          hx-confirm="Permanently delete this thought?" title="Delete entry"
          class="text-zinc-400 hover:text-red-500 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="#1d1d1d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18" />
            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
            <line x1="10" x2="10" y1="11" y2="17" />
            <line x1="14" x2="14" y1="11" y2="17" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
