{% for entry in entries %}
<div class="mb-8 border-zinc-100 pl-4 bg-white p-4 shadow-sm rounded-xl">
    {% include 'scroll/entry_item.html' %}
    <form hx-post="{% url 'share_entry' entry.id %}" hx-target="#status-{{ entry.id }}"
        class="flex flex-col gap-1 ml-2">
        {% csrf_token %}
        <div class="flex gap-2">
            <input type="email" name="email" placeholder="friend@email.com" required
                class="text-xs mt-5 border-b border-zinc-200 bg-transparent max-w-100 outline-none p-2 ml-4 focus:border-zinc-900">
                <button type="submit" class="group p-2 -m-2 flex items-center justify-center focus:outline-none" aria-label="Share">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" 
                         stroke="#1d1d1d" 
                         stroke-width="2.5" 
                         stroke-linecap="round" 
                         stroke-linejoin="round" 
                         class="text-zinc-400 transition-colors group-hover:text-[#2b6cb0]">
                      <circle cx="18" cy="5" r="3"></circle>
                      <circle cx="6" cy="12" r="3"></circle>
                      <circle cx="18" cy="19" r="3"></circle>
                      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                    </svg>
                  </button>
            <div id="status-{{ entry.id }}"></div>
        </div>
    </form>
</div>
{% empty %}
<div class="text-center py-20 text-zinc-400 text-sm">
    The scroll is empty...
</div>
{% endfor %}
